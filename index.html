<style>
:root{
  --deep:#0D3B5C;--mid:#1A6B9A;--light:#2E9BD4;--pale:#D6EAF8;
  --bg:#F4F8FB;--white:#fff;--text:#0D1F2D;--muted:#7B9BB3;--border:#D0E4F0;--pin:#E8A020;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;overflow-x:hidden;}

/* INTRO */
#intro-screen{transition:opacity .5s ease;}
#intro-logo{transition:opacity .6s ease,transform .6s cubic-bezier(.16,1,.3,1);}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(244,248,251,.95);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  height:60px;padding:0 32px;
  display:flex;align-items:center;
  opacity:0;transition:opacity .5s ease;
}
nav.show{opacity:1;}
.nav-logo{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:26px;text-decoration:none;color:var(--deep);
  display:flex;align-items:baseline;gap:5px;white-space:nowrap;flex-shrink:0;
}
.nav-logo .num{color:var(--mid);}
.nav-logo .lbl{font-size:12px;font-weight:500;color:var(--muted);}
.nav-search{
  position:relative;display:flex;align-items:center;
  margin:0 auto;width:100%;max-width:320px;
}
.nav-search input{
  width:100%;padding:8px 16px 8px 36px;
  border:1.5px solid var(--border);border-radius:20px;
  font-family:'Noto Sans TC',sans-serif;font-size:13px;
  outline:none;transition:all .2s;background:var(--pale);color:var(--text);
}
.nav-search input:focus{border-color:var(--mid);background:white;}
.nav-search .s-icon{position:absolute;left:12px;width:14px;height:14px;color:var(--muted);pointer-events:none;}
.nav-search:focus-within .s-icon{color:var(--mid);}
.nav-right{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.nav-link{
  display:flex;align-items:center;gap:5px;
  padding:7px 12px;border-radius:6px;text-decoration:none;
  font-size:13px;font-weight:500;color:var(--muted);transition:all .2s;white-space:nowrap;
}
.nav-link:hover{background:var(--pale);color:var(--deep);}
.nav-link svg{width:14px;height:14px;flex-shrink:0;}

/* SEARCH DROPDOWN */
.nav-search { position: relative; }
.search-dropdown {
  display: none;
  position: absolute; top: calc(100% + 8px); left: 0; right: 0;
  background: white; border: 1.5px solid var(--border);
  border-radius: 10px; box-shadow: 0 8px 32px rgba(13,59,92,.12);
  max-height: 360px; overflow-y: auto; z-index: 500;
}
.search-dropdown.show { display: block; }
.search-dropdown::-webkit-scrollbar { width: 4px; }
.search-dropdown::-webkit-scrollbar-track { background: transparent; }
.search-dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.sd-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; text-decoration: none; color: var(--text);
  border-bottom: 1px solid var(--border); transition: background .15s;
}
.sd-item:last-child { border-bottom: none; }
.sd-item:hover { background: var(--pale); }
.sd-item-icon {
  width: 32px; height: 32px; border-radius: 6px; background: var(--pale);
  display: flex; align-items: center; justify-content: center;
  color: var(--mid); flex-shrink: 0;
}
.sd-item-icon svg { width: 14px; height: 14px; }
.sd-item-info { flex: 1; min-width: 0; }
.sd-item-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sd-item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; gap: 6px; }
.sd-item-group { font-size: 10px; font-weight: 600; color: var(--light); background: rgba(46,155,212,.1); padding: 1px 6px; border-radius: 3px; }
.sd-empty { padding: 20px 16px; text-align: center; font-size: 13px; color: var(--muted); }
.sd-header { padding: 8px 16px; font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--bg); }

/* HERO */
.hero{
  min-height:100vh;padding:78px 60px 80px;
  display:flex;flex-direction:column;justify-content:center;
  position:relative;overflow:hidden;
}
.hero-bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 80% at 90% 50%,rgba(46,155,212,.07) 0%,transparent 60%);}
.hero-num-bg{
  position:absolute;right:-20px;bottom:-20px;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:clamp(180px,28vw,360px);line-height:1;
  color:rgba(13,59,92,.04);pointer-events:none;user-select:none;
}
.hero-eyebrow{
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:.2em;text-transform:uppercase;color:var(--light);margin-bottom:20px;
  opacity:0;transform:translateY(16px);transition:opacity .7s ease,transform .7s ease;
}
.hero-title{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:clamp(40px,6vw,88px);line-height:1;
  letter-spacing:-.02em;margin-bottom:28px;
  opacity:0;transform:translateY(16px);transition:opacity .7s ease .1s,transform .7s ease .1s;
}
.hero-title .solid{color:var(--deep);}
.hero-title .outline{color:transparent;-webkit-text-stroke:2px var(--mid);}
.hero-title .accent{color:var(--light);}
.hero-desc{
  font-size:16px;color:var(--muted);line-height:1.8;
  max-width:400px;margin-bottom:32px;font-weight:300;
  opacity:0;transform:translateY(16px);transition:opacity .7s ease .2s,transform .7s ease .2s;
}
.hero-btns{
  display:flex;gap:12px;flex-wrap:wrap;
  opacity:0;transform:translateY(16px);transition:opacity .7s ease .3s,transform .7s ease .3s;
}
.hero-cta{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--deep);color:white;
  padding:13px 28px;border-radius:3px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:700;letter-spacing:.1em;
  text-decoration:none;transition:background .2s;
}
.hero-cta:hover{background:var(--mid);}
.hero-cta svg{width:15px;height:15px;}
.hero-cta-sec{
  display:inline-flex;align-items:center;gap:8px;
  background:transparent;color:var(--mid);
  padding:13px 24px;border-radius:3px;
  border:1.5px solid var(--mid);
  font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:700;letter-spacing:.1em;
  text-decoration:none;transition:all .2s;
}
.hero-cta-sec:hover{background:var(--pale);}
.hero-cta-sec svg{width:15px;height:15px;}

.hero-eyebrow.show,.hero-title.show,.hero-desc.show,.hero-btns.show{opacity:1!important;transform:translateY(0)!important;}

/* PINNED BANNER */
.pinned-banner{
  display:none;background:var(--pin);
  padding:12px 32px;align-items:center;gap:12px;
  font-size:14px;font-weight:500;color:white;text-decoration:none;
  position:fixed;top:60px;left:0;right:0;z-index:98;
}
.pinned-banner.show{display:flex;}
body.has-banner .hero{padding-top:120px;}
body.has-banner .filters-wrap{margin-top:48px;}
.pin-label{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.15em;
  background:rgba(255,255,255,.25);padding:2px 8px;border-radius:2px;
}
.pin-arrow{margin-left:auto;}
.pin-arrow svg{width:16px;height:16px;}

/* FILTERS */
.filters-wrap{padding:32px 60px 0;}

.filters-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.filter-btn{
  padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);
  background:white;font-size:13px;font-weight:500;
  color:var(--muted);cursor:pointer;transition:all .2s;
  font-family:'Noto Sans TC',sans-serif;white-space:nowrap;
}
.filter-btn:hover{border-color:var(--mid);color:var(--mid);}
.filter-btn.active{background:var(--deep);border-color:var(--deep);color:white;}

/* ANNOUNCEMENTS */
.announcements{padding:32px 60px 80px;}
.sec-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px;}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:48px;letter-spacing:-.01em;}
.sec-title .accent{color:var(--mid);}
.sec-count{font-size:13px;color:var(--muted);}

/* CARDS */
.cards-list{display:flex;flex-direction:column;gap:12px;}
.card{
  background:white;border:1.5px solid var(--border);border-radius:10px;
  overflow:hidden;display:flex;text-decoration:none;color:inherit;
  transition:border-color .2s,transform .2s,box-shadow .2s;
  position:relative;
}
.card:hover{border-color:var(--mid);transform:translateY(-2px);box-shadow:0 8px 28px rgba(13,59,92,.09);}
.card.pinned{border-color:var(--pin);}
.card.group-pinned{border-color:var(--light);}
.card-accent{width:4px;flex-shrink:0;background:var(--mid);}
.card.pinned .card-accent{background:var(--pin);}
.card.group-pinned .card-accent{background:var(--light);}
.card-img{width:110px;flex-shrink:0;background:var(--pale);overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;}
.card-body{padding:18px 22px;flex:1;min-width:0;}
.card-meta{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap;}
.pin-badge{
  display:none;
  font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.15em;color:var(--pin);background:#FEF3DC;
  border:1px solid #F4CC7A;border-radius:3px;padding:2px 7px;text-transform:uppercase;
}
.card.pinned .pin-badge{display:inline-block;}
.group-pin-badge{
  display:none;
  font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.15em;color:var(--light);background:rgba(46,155,212,.1);
  border:1px solid rgba(46,155,212,.3);border-radius:3px;padding:2px 7px;text-transform:uppercase;
}
.card.group-pinned .group-pin-badge{display:inline-block;}
.card-date{font-size:12px;color:var(--muted);}
.card-views{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px;}
.card-views svg{width:11px;height:11px;}
.card-title{font-size:16px;font-weight:700;line-height:1.5;margin-bottom:5px;}
.card-excerpt{font-size:13px;color:var(--muted);line-height:1.7;font-weight:300;}
.card-group-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:3px;background:rgba(46,155,212,.1);color:var(--light);}
.card-right{
  padding:18px 18px 18px 0;
  display:flex;flex-direction:column;align-items:flex-end;
  justify-content:space-between;flex-shrink:0;gap:8px;
}
.card-timer{
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
  color:var(--mid);background:var(--pale);padding:5px 10px;border-radius:4px;white-space:nowrap;text-align:right;
}
.card-timer.urgent{color:#c0392b;background:#fdecea;}
.card-timer.done{color:var(--muted);background:#f0f0f0;}

/* PROGRESS BAR */
.card-progress{width:100%;margin-top:8px;}
.progress-bar-wrap{
  height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:5px;
}
.progress-bar-fill{
  height:100%;border-radius:3px;transition:width .3s;
  background:linear-gradient(90deg,var(--mid),var(--light));
}
.progress-bar-fill.done{background:var(--muted);}
.progress-bar-fill.urgent{background:linear-gradient(90deg,#e74c3c,#e67e22);}
.progress-bar-fill.upcoming{background:var(--pale);border:1px solid var(--border);}
.progress-label{font-size:11px;font-weight:600;color:var(--mid);white-space:nowrap;}
.progress-label.done{color:var(--muted);}
.progress-label.urgent{color:#c0392b;}
.progress-label.upcoming{color:var(--muted);}
.card-arrow{
  width:30px;height:30px;border-radius:50%;
  background:var(--pale);display:flex;align-items:center;justify-content:center;
  color:var(--mid);transition:all .2s;flex-shrink:0;
}
.card:hover .card-arrow{background:var(--mid);color:white;}
.card-arrow svg{width:13px;height:13px;}

/* EMPTY / ERROR */
.empty{text-align:center;padding:72px 40px;background:white;border:1.5px dashed var(--border);border-radius:10px;}
.empty-icon{font-size:40px;margin-bottom:14px;}
.empty-text{font-size:15px;color:var(--muted);margin-bottom:20px;}
.empty-sub{font-size:13px;color:var(--border);}

/* BACK TO TOP */
.back-top{
  position:fixed;bottom:88px;right:20px;z-index:199;
  width:40px;height:40px;border-radius:50%;
  background:var(--deep);color:white;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;
  box-shadow:0 4px 14px rgba(13,59,92,.25);
}
.back-top.show{opacity:1;transform:translateY(0);pointer-events:auto;}
.back-top:hover{background:var(--mid);}
.back-top svg{width:16px;height:16px;}

/* LINE FLOAT */
.line-float{position:fixed;bottom:32px;right:20px;z-index:200;}
.line-btn{
  width:50px;height:50px;border-radius:50%;background:#06C755;
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;box-shadow:0 4px 18px rgba(6,199,85,.4);transition:transform .2s;
}
.line-btn:hover{transform:scale(1.08);}
.line-btn svg{width:27px;height:27px;fill:white;}

/* FOOTER */
footer{
  margin-top:20px;padding:28px 60px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.footer-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--deep);}
.footer-logo span{color:var(--mid);}
.footer-right{display:flex;align-items:center;gap:20px;}
.footer-copy{font-size:12px;color:var(--muted);}
.footer-admin{font-size:11px;color:var(--border);text-decoration:none;transition:color .2s;}
.footer-admin:hover{color:var(--muted);}

/* REVEAL */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease;}
.reveal.in{opacity:1;transform:translateY(0);}

/* CARD FADE IN */
@keyframes cardIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.card-animate{animation:cardIn .4s ease forwards;}

@media(max-width:768px){
  nav{padding:0 16px;height:54px;}
  .nav-logo{font-size:22px;}
  .nav-logo .lbl{display:none;}
  .nav-search{max-width:180px;}
  .nav-search input{font-size:13px;padding:7px 12px 7px 32px;}
  .nav-right{gap:0;}
  .nav-link{padding:6px 8px;}
  .nav-link span{display:none;}
  .hero{padding:74px 20px 48px;min-height:auto;}
  .hero-title{font-size:clamp(40px,13vw,68px);margin-bottom:18px;}
  .hero-desc{font-size:14px;margin-bottom:28px;}
  .hero-btns{flex-direction:column;}
  .hero-cta,.hero-cta-sec{width:100%;justify-content:center;}
  .hero-num-bg{display:none;}
  .pinned-banner{padding:12px 16px;font-size:13px;}
  .filters-wrap{padding:24px 16px 0;}
  .filters-bar{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px;}
  .filters-bar::-webkit-scrollbar{display:none;}
  .filter-btn{flex-shrink:0;}
  .announcements{padding:24px 16px 60px;}
  .sec-title{font-size:36px;}
  .card-img{display:none;}
  .card-body{padding:14px 14px;}
  .card-title{font-size:15px;}
  .card-right{padding:14px 12px 14px 0;}
  .back-top{bottom:92px;right:14px;width:36px;height:36px;}
  .line-float{bottom:24px;right:14px;}
  .line-btn{width:46px;height:46px;}
  footer{padding:20px 16px;flex-direction:column;gap:8px;text-align:center;}
  .footer-right{flex-direction:row;justify-content:center;}
}
</style>
</head>
<body>

<div id="intro-screen" style="position:fixed;inset:0;background:var(--deep);z-index:1000;display:flex;align-items:center;justify-content:center;">
  <div id="intro-logo" style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(120px,25vw,220px);line-height:1;color:white;letter-spacing:-.02em;opacity:0;transform:scale(.8);">
    <span>1</span><span style="color:rgba(255,255,255,.4);-webkit-text-stroke:2px rgba(255,255,255,.7);">1</span><span>6</span>
  </div>
</div>

<nav id="nav">
  <a href="index.html" class="nav-logo"><span class="num">116</span><span class="lbl">畢籌會</span></a>
  <div class="nav-search">
    <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="nav-search-input" placeholder="搜尋公告⋯" oninput="handleSearch(this.value)" autocomplete="off" onfocus="showDropdown()" onblur="hideDropdown()">
    <div class="search-dropdown" id="search-dropdown"></div>
  </div>
  <div class="nav-right">
    <a href="calendar.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>活動日曆</span>
    </a>
    <a href="#announcements" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span>最新消息</span>
    </a>
  </div>
</nav>

<a class="pinned-banner" id="pinned-banner" href="#">
  <span class="pin-label">置頂</span>
  <span id="pinned-text"></span>
  <span class="pin-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
</a>

<section class="hero" id="hero">
  <div class="hero-bg"></div>
  <div class="hero-num-bg">116</div>
  <div class="hero-eyebrow" id="h-eyebrow">Class of 116 · 畢籌會</div>
  <h1 class="hero-title" id="h-title">
    <span class="solid">畢籌會</span><br>
    <span class="outline">公告</span><br>
    <span class="accent">一站看。</span>
  </h1>
  <p class="hero-desc" id="h-desc">活動通知、重要時程、表單連結，<br>所有畢籌相關資訊都在這裡。</p>
  <div class="hero-btns" id="h-btns">
    <a href="#announcements" class="hero-cta">
      查看最新公告
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
    <a href="calendar.html" class="hero-cta-sec">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      活動日曆
    </a>
  </div>
</section>

<div class="filters-wrap reveal" id="filters-wrap">
  <div class="filters-bar" id="filters-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
  </div>
</div>

<section class="announcements reveal" id="announcements">
  <div class="sec-header">
    <h2 class="sec-title">最新<span class="accent">消息</span></h2>
    <span class="sec-count" id="sec-count"></span>
  </div>
  <div class="cards-list" id="cards-list">
    <div class="empty"><div class="empty-icon">📭</div><div class="empty-text">目前還沒有公告</div></div>
  </div>
</section>

<button class="back-top" id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到頂部">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<div class="line-float">

    <a href="admin-login.html" class="footer-admin">後台</a>

<script>
(function(){
  /* ── INTRO ── */
  function showHero(){
    document.body.style.overflow='';
    document.getElementById('nav').classList.add('show');
    ['h-eyebrow','h-title','h-desc','h-btns'].forEach(function(id){
      var el=document.getElementById(id); if(el) el.classList.add('show');
    });
    setupScrollReveal();
    renderCards();
    setupBackTop();
  }
  function runIntro(){
    document.body.style.overflow='hidden';
    var screen=document.getElementById('intro-screen');
    var logo=document.getElementById('intro-logo');
    if(!screen||!logo){showHero();return;}
    setTimeout(function(){logo.style.opacity='1';logo.style.transform='scale(1)';},100);
    setTimeout(function(){
      logo.style.transition='transform .15s ease';logo.style.transform='scale(1.06)';
      setTimeout(function(){logo.style.transform='scale(1)';},150);
    },800);
    setTimeout(function(){screen.style.opacity='0';},1200);
    setTimeout(function(){screen.style.display='none';showHero();},1750);
  }
  if(sessionStorage.getItem('116_visited')){
    var s=document.getElementById('intro-screen'); if(s) s.style.display='none';
    showHero();
  } else {
    sessionStorage.setItem('116_visited','1');
    runIntro();
  }

  /* ── BACK TO TOP ── */
  function setupBackTop(){
    var btn=document.getElementById('back-top');
    if(!btn) return;
    window.addEventListener('scroll',function(){
      btn.classList.toggle('show',window.scrollY>400);
    });
  }

  /* ── SCROLL REVEAL ── */
  function setupScrollReveal(){
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting) e.target.classList.add('in');});
    },{threshold:.05});
    document.querySelectorAll('.reveal').forEach(function(el){obs.observe(el);});
  }

  /* ── DATA ── */
  var allArticles=[];
  var currentFilter='all';
  var currentQuery='';

  function renderCards(){
    var list=document.getElementById('cards-list');
    if(!list) return;
    list.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);font-size:14px">載入中⋯</div>';

    // Load groups
    window.db.ref('settings/groups').once('value').then(function(gsnap){
      var g=gsnap.val();
      var bar=document.getElementById('filters-bar');
      if(bar && g && Array.isArray(g) && g.length){
        bar.innerHTML='<button class="filter-btn active" onclick="setFilter(\'all\',this)">全部</button>'
          +g.map(function(grp){
            return '<button class="filter-btn" onclick="setFilter(\''+grp+'\',this)">'+grp+'</button>';
          }).join('');
      }
    });

    // Load appearance
    window.db.ref('settings/appearance').once('value').then(function(asnap){
      var a=asnap.val()||{};
      if(a.footerText){var fc=document.getElementById('footer-copy'); if(fc) fc.textContent=a.footerText;}
    });

    // Load articles
    window.db.ref('articles').once('value').then(function(snap){
      var val=snap.val();
      if(!val){allArticles=[];}
      else{allArticles=Object.values(val).filter(function(a){return !a.draft;}).sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});}

      // Pinned banner
      var pinned0=allArticles.find(function(a){return a.pinned;});
      if(pinned0){
        var banner=document.getElementById('pinned-banner');
        var txt=document.getElementById('pinned-text');
        if(banner&&txt){
          txt.textContent=pinned0.title;
          banner.href='article.html?id='+encodeURIComponent(pinned0.id);
          banner.classList.add('show');
          document.body.classList.add('has-banner');
        }
      }


      applyFilters();
    }).catch(function(){
      list.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">載入失敗，請重新整理</div></div>';
    });
  }

  function applyFilters(){
    var list=document.getElementById('cards-list'); if(!list) return;
    var q=currentQuery.toLowerCase().trim();
    var filtered=allArticles.filter(function(a){
      if(currentFilter!=='all' && a.group!==currentFilter) return false;
      if(q){
        var inT=(a.title||'').toLowerCase().indexOf(q)>=0;
        var inC=(a.content||'').replace(/<[^>]*>/g,'').toLowerCase().indexOf(q)>=0;
        var inD=fmtDate(a.createdAt).indexOf(q)>=0;
        if(!inT&&!inC&&!inD) return false;
      }
      return true;
    });

    // Sort: global pinned → group pinned (when filtering) → rest
    var gp=filtered.filter(function(a){return a.pinned;});
    var lgp=filtered.filter(function(a){return !a.pinned&&a.groupPinned&&currentFilter!=='all';});
    var rest=filtered.filter(function(a){return !a.pinned&&!(a.groupPinned&&currentFilter!=='all');});
    var sorted=gp.concat(lgp).concat(rest);

    var countEl=document.getElementById('sec-count');
    if(countEl) countEl.textContent=sorted.length?(q||currentFilter!=='all'?'找到 '+sorted.length+' 則':'共 '+sorted.length+' 則'):'';

    if(!sorted.length){
      list.innerHTML=q||currentFilter!=='all'
        ?'<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">找不到符合的公告</div><div class="empty-sub">試試其他關鍵字</div></div>'
        :'<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">目前還沒有公告</div></div>';
      return;
    }

    list.innerHTML=sorted.map(function(a,i){
      var isPinned=a.pinned;
      var isGroupPinned=!isPinned&&a.groupPinned&&currentFilter!=='all';
      var excerpt=(a.content||'').replace(/<[^>]*>/g,'').slice(0,80);
      var imgHtml=a.image?'<div class="card-img"><img src="'+a.image+'" alt="" loading="lazy"></div>':'';
      var timer=a.postType==='event'?progressHtml(a.eventStart,a.eventTime):(a.eventTime?timerHtml(a.eventTime):'');
      var groupTag=a.group?'<span class="card-group-tag">'+a.group+'</span>':'';
      var views=a.views?'<span class="card-views"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'+a.views+'</span>':'';
      var cls='card'+(isPinned?' pinned':'')+(isGroupPinned?' group-pinned':'');
      return '<a class="'+cls+' card-animate" href="article.html?id='+encodeURIComponent(a.id)+'" style="animation-delay:'+(i*0.04)+'s">'
        +'<div class="card-accent"></div>'
        +imgHtml
        +'<div class="card-body">'
        +'<div class="card-meta">'
        +'<span class="pin-badge">置頂</span>'
        +'<span class="group-pin-badge">組內置頂</span>'
        +groupTag
        +'<span class="card-date">'+fmtDate(a.createdAt)+'</span>'
        +views
        +'</div>'
        +'<div class="card-title">'+hl(a.title,q)+'</div>'
        +(excerpt?'<div class="card-excerpt">'+hl(excerpt+(excerpt.length>=80?'⋯':''),q)+'</div>':'')
        +'</div>'
        +'<div class="card-right">'
        +timer
        +'<div class="card-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>'
        +'</div></a>';
    }).join('');
    startCountdowns();
  }

  function hl(text,q){
    if(!q) return text;
    var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    return text.replace(re,'<mark style="background:#FFF3CD;color:inherit;border-radius:2px;padding:0 2px;">$1</mark>');
  }

  window.handleSearch=function(val){
    currentQuery=val;
    var ni=document.getElementById('nav-search-input');
    if(ni&&ni.value!==val) ni.value=val;
    updateDropdown(val);
    applyFilters();
  };

  function updateDropdown(q){
    var dd=document.getElementById('search-dropdown');
    if(!dd) return;
    if(!q||q.trim().length<1){dd.classList.remove('show');return;}
    var results=allArticles.filter(function(a){
      return (a.title||'').toLowerCase().indexOf(q.toLowerCase())>=0
        ||(a.content||'').replace(/<[^>]*>/g,'').toLowerCase().indexOf(q.toLowerCase())>=0;
    }).slice(0,8);
    if(!results.length){
      dd.innerHTML='<div class="sd-empty">找不到「'+escHtml(q)+'」相關公告</div>';
    } else {
      dd.innerHTML='<div class="sd-header">搜尋結果</div>'
        +results.map(function(a){
          var groupBadge=a.group?'<span class="sd-item-group">'+a.group+'</span>':'';
          var excerpt=(a.content||'').replace(/<[^>]*>/g,'');
          var idx=excerpt.toLowerCase().indexOf(q.toLowerCase());
          var preview=idx>=0?'⋯'+excerpt.slice(Math.max(0,idx-15),idx+30)+'⋯':excerpt.slice(0,40);
          return '<a class="sd-item" href="article.html?id='+encodeURIComponent(a.id)+'">'
            +'<div class="sd-item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>'
            +'<div class="sd-item-info">'
            +'<div class="sd-item-title">'+hl(a.title||'',q)+'</div>'
            +'<div class="sd-item-meta">'+groupBadge+'<span>'+fmtDate(a.createdAt)+'</span>'+(preview?'<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;">'+hl(preview,q)+'</span>':'')+'</div>'
            +'</div></a>';
        }).join('');
    }
    dd.classList.add('show');
  }

  window.showDropdown=function(){
    var q=document.getElementById('nav-search-input');
    if(q&&q.value.trim()) updateDropdown(q.value);
  };
  window.hideDropdown=function(){
    setTimeout(function(){
      var dd=document.getElementById('search-dropdown');
      if(dd) dd.classList.remove('show');
    },200);
  };

  function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  window.setFilter=function(group,btn){
    currentFilter=group;
    document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
    if(btn) btn.classList.add('active');
    applyFilters();
  };

  function fmtDate(iso){
    if(!iso) return '';
    var d=new Date(iso);
    return d.getFullYear()+'/'+(d.getMonth()+1+'').padStart(2,'0')+'/'+(d.getDate()+'').padStart(2,'0');
  }
  function progressHtml(startTime, endTime){
    if(!endTime) return '';
    var now=Date.now();
    var start=startTime?new Date(startTime).getTime():null;
    var end=new Date(endTime).getTime();
    var diff=end-now;

    if(diff<=0){
      return '<div class="card-progress">'
        +'<div class="progress-bar-wrap"><div class="progress-bar-fill done" style="width:100%"></div></div>'
        +'<div class="progress-label done">已結束</div>'
        +'</div>';
    }
    if(start&&now<start){
      var daysUntil=Math.ceil((start-now)/86400000);
      return '<div class="card-progress">'
        +'<div class="progress-bar-wrap"><div class="progress-bar-fill upcoming" style="width:0%"></div></div>'
        +'<div class="progress-label upcoming">'+daysUntil+'天後開始</div>'
        +'</div>';
    }
    var total=start?(end-new Date(startTime).getTime()):(end-(now-7*86400000));
    var elapsed=start?(now-new Date(startTime).getTime()):(7*86400000);
    var pct=Math.min(100,Math.max(0,Math.round(elapsed/total*100)));
    var daysLeft=Math.ceil(diff/86400000);
    var hoursLeft=Math.ceil(diff/3600000);
    var isUrgent=diff<3*86400000;
    var label=daysLeft>1?'還剩 '+daysLeft+' 天':(hoursLeft>1?'還剩 '+hoursLeft+' 小時':'即將結束');
    return '<div class="card-progress" data-start="'+(startTime||'')+'" data-end="'+endTime+'">'
      +'<div class="progress-bar-wrap"><div class="progress-bar-fill'+(isUrgent?' urgent':'')+'" style="width:'+pct+'%"></div></div>'
      +'<div class="progress-label'+(isUrgent?' urgent':'')+' progress-text">'+label+'</div>'
      +'</div>';
  }

  function timerHtml(t){
    var diff=new Date(t)-Date.now();
    if(diff<0) return '<div class="card-timer done">已結束</div>';
    if(diff>30*86400000) return '<div class="card-timer">'+fmtDate(t)+'</div>';
    return '<div class="card-timer" data-event="'+t+'">計算中</div>';
  }
  function startCountdowns(){
    function pad(n){return(n+'').padStart(2,'0');}
    function tick(){
      document.querySelectorAll('[data-event]').forEach(function(el){
        var diff=new Date(el.dataset.event)-Date.now();
        if(diff<=0){el.textContent='已結束';el.className='card-timer done';return;}
        var d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),
            m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
        el.textContent=d>0?(d+'天 '+pad(h)+':'+pad(m)+':'+pad(s)):(pad(h)+':'+pad(m)+':'+pad(s));
        el.className=diff<86400000?'card-timer urgent':'card-timer';
      });
    }
    tick(); setInterval(tick,1000);
  }
})();
</script>
