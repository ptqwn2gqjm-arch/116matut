<style>
:root{
  --deep:#0D3B5C;--mid:#1A6B9A;--light:#2E9BD4;--pale:#D6EAF8;
  --bg:#F4F8FB;--white:#fff;--text:#0D1F2D;--muted:#7B9BB3;--border:#D0E4F0;--pin:#E8A020;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(244,248,251,.95);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  height:60px;padding:0 32px;
  display:flex;align-items:center;gap:14px;
}
.nav-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;text-decoration:none;color:var(--deep);display:flex;align-items:baseline;gap:5px;white-space:nowrap;flex-shrink:0;}
.nav-logo .num{color:var(--mid);}
.nav-logo .lbl{font-size:12px;font-weight:500;color:var(--muted);}
.nav-search{position:relative;display:flex;align-items:center;margin:0 auto;width:100%;max-width:320px;}
.nav-search input{width:100%;padding:8px 16px 8px 36px;border:1.5px solid var(--border);border-radius:20px;font-family:'Noto Sans TC',sans-serif;font-size:13px;outline:none;transition:all .2s;background:var(--pale);color:var(--text);}
.nav-search input:focus{border-color:var(--mid);background:white;}
.nav-search .s-icon{position:absolute;left:12px;width:14px;height:14px;color:var(--muted);pointer-events:none;}
.nav-search:focus-within .s-icon{color:var(--mid);}
.nav-back{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:500;color:var(--muted);transition:all .2s;white-space:nowrap;flex-shrink:0;}
.nav-back:hover{background:var(--pale);color:var(--deep);}
.nav-back svg{width:14px;height:14px;}

/* MAIN */
.main{max-width:860px;margin:0 auto;padding:80px 24px 80px;}

/* HEADER */
.page-header{margin-bottom:28px;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:48px;letter-spacing:-.01em;color:var(--deep);}
.page-title span{color:var(--mid);}
.page-sub{font-size:13px;color:var(--muted);margin-top:4px;}

/* FILTERS */
.filters-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:24px;}
.filter-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;font-family:'Noto Sans TC',sans-serif;white-space:nowrap;}
.filter-btn:hover{border-color:var(--mid);color:var(--mid);}
.filter-btn.active{background:var(--deep);border-color:var(--deep);color:white;}

/* SORT */
.list-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.result-count{font-size:13px;color:var(--muted);}
.sort-select{border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-family:'Noto Sans TC',sans-serif;font-size:13px;outline:none;background:white;color:var(--text);cursor:pointer;}
.sort-select:focus{border-color:var(--mid);}

/* CARDS */
.cards-list{display:flex;flex-direction:column;gap:12px;}
.card{background:white;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;display:flex;text-decoration:none;color:inherit;transition:border-color .2s,transform .2s,box-shadow .2s;}
.card:hover{border-color:var(--mid);transform:translateY(-2px);box-shadow:0 8px 28px rgba(13,59,92,.09);}
.card.pinned{border-color:var(--pin);}
.card.group-pinned{border-color:var(--light);}
.card-accent{width:4px;flex-shrink:0;background:var(--mid);}
.card.pinned .card-accent{background:var(--pin);}
.card.group-pinned .card-accent{background:var(--light);}
.card-img{width:110px;flex-shrink:0;background:var(--pale);overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;}
.card-body{padding:18px 20px;flex:1;min-width:0;}
.card-meta{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap;}
.pin-badge{display:none;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.15em;color:var(--pin);background:#FEF3DC;border:1px solid #F4CC7A;border-radius:3px;padding:2px 7px;text-transform:uppercase;}
.card.pinned .pin-badge{display:inline-block;}
.card-date{font-size:12px;color:var(--muted);}
.card-views{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px;}
.card-views svg{width:11px;height:11px;}
.card-title{font-size:16px;font-weight:700;line-height:1.5;margin-bottom:5px;}
.card-excerpt{font-size:13px;color:var(--muted);line-height:1.7;font-weight:300;}
.card-group-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:3px;background:rgba(46,155,212,.1);color:var(--light);}
.card-right{padding:18px 18px 18px 0;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;flex-shrink:0;gap:8px;}
.card-timer{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--mid);background:var(--pale);padding:5px 10px;border-radius:4px;white-space:nowrap;}
.card-timer.urgent{color:#c0392b;background:#fdecea;}
.card-timer.done{color:var(--muted);background:#f0f0f0;}
.card-arrow{width:30px;height:30px;border-radius:50%;background:var(--pale);display:flex;align-items:center;justify-content:center;color:var(--mid);transition:all .2s;flex-shrink:0;}
.card:hover .card-arrow{background:var(--mid);color:white;}
.card-arrow svg{width:13px;height:13px;}

/* PROGRESS */
.card-progress{width:100%;margin-top:8px;}
.progress-bar-wrap{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:4px;}
.progress-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--mid),var(--light));}
.progress-bar-fill.done{background:var(--muted);}
.progress-bar-fill.urgent{background:linear-gradient(90deg,#e74c3c,#e67e22);}
.progress-label{font-size:11px;font-weight:600;color:var(--mid);}
.progress-label.done{color:var(--muted);}
.progress-label.urgent{color:#c0392b;}

/* EMPTY */
.empty{text-align:center;padding:72px 40px;background:white;border:1.5px dashed var(--border);border-radius:10px;}
.empty-icon{font-size:40px;margin-bottom:14px;}
.empty-text{font-size:15px;color:var(--muted);}

/* LOAD MORE */
.load-more-wrap{text-align:center;margin-top:28px;}
.load-more-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:6px;border:1.5px solid var(--border);background:white;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.08em;color:var(--muted);cursor:pointer;transition:all .2s;}
.load-more-btn:hover{border-color:var(--mid);color:var(--mid);}

/* SEARCH DROPDOWN */
.nav-search{position:relative;}
.search-dropdown{display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;background:white;border:1.5px solid var(--border);border-radius:10px;box-shadow:0 8px 32px rgba(13,59,92,.12);max-height:320px;overflow-y:auto;z-index:500;}
.search-dropdown.show{display:block;}
.sd-item{display:flex;align-items:center;gap:12px;padding:12px 16px;text-decoration:none;color:var(--text);border-bottom:1px solid var(--border);transition:background .15s;}
.sd-item:last-child{border-bottom:none;}
.sd-item:hover{background:var(--pale);}
.sd-icon{width:30px;height:30px;border-radius:6px;background:var(--pale);display:flex;align-items:center;justify-content:center;color:var(--mid);flex-shrink:0;}
.sd-icon svg{width:13px;height:13px;}
.sd-info{flex:1;min-width:0;}
.sd-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sd-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.sd-empty{padding:18px 16px;text-align:center;font-size:13px;color:var(--muted);}

/* BACK TO TOP */
.back-top{position:fixed;bottom:32px;right:20px;z-index:199;width:40px;height:40px;border-radius:50%;background:var(--deep);color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;box-shadow:0 4px 14px rgba(13,59,92,.25);}
.back-top.show{opacity:1;transform:translateY(0);pointer-events:auto;}
.back-top:hover{background:var(--mid);}
.back-top svg{width:16px;height:16px;}

/* LINE */
.line-float{position:fixed;bottom:80px;right:20px;z-index:200;}
.line-btn{width:48px;height:48px;border-radius:50%;background:#06C755;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 4px 16px rgba(6,199,85,.4);transition:transform .2s;}
.line-btn:hover{transform:scale(1.08);}
.line-btn svg{width:26px;height:26px;fill:white;}

footer{padding:28px 32px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.footer-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--deep);}
.footer-logo span{color:var(--mid);}
.footer-copy{font-size:12px;color:var(--muted);}

@keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.card-animate{animation:cardIn .35s ease forwards;}

@media(max-width:768px){
  nav{padding:0 16px;height:54px;}
  .nav-logo{font-size:22px;}
  .nav-logo .lbl{display:none;}
  .nav-search{max-width:180px;}
  .nav-search input{font-size:13px;}
  .nav-back span{display:none;}
  .main{padding:70px 16px 60px;}
  .page-title{font-size:36px;}
  .filters-row{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px;}
  .filters-row::-webkit-scrollbar{display:none;}
  .filter-btn{flex-shrink:0;}
  .card-img{display:none;}
  .card-body{padding:14px 14px;}
  .card-title{font-size:15px;}
  .card-right{padding:14px 12px 14px 0;}
  .back-top{bottom:92px;right:14px;}
  .line-float{bottom:24px;right:14px;}
  footer{padding:20px 16px;flex-direction:column;gap:8px;text-align:center;}
}
</style>
</head>
<body>

<nav>

<script>
(function(){
  var allArticles=[];
  var filtered=[];
  var currentFilter='all';
  var currentQuery='';
  var currentSort='custom';
  var PAGE_SIZE=20;
  var displayCount=PAGE_SIZE;

  // Back to top
  var btt=document.getElementById('back-top');
  if(btt) window.addEventListener('scroll',function(){btt.classList.toggle('show',window.scrollY>400);});

  // Load data
  window.db.ref('settings/groups').once('value').then(function(snap){
    var g=snap.val();
    var bar=document.getElementById('filters-row');
    if(bar&&g&&Array.isArray(g)&&g.length){
      bar.innerHTML='<button class="filter-btn active" onclick="setFilter(\'all\',this)">全部</button>'
        +g.map(function(grp){return '<button class="filter-btn" onclick="setFilter(\''+grp+'\',this)">'+grp+'</button>';}).join('');
    }
  });

  window.db.ref('articles').once('value').then(function(snap){
    var val=snap.val();
    var raw=val?Object.values(val).filter(function(a){return !a.draft;}):[];
    // Sort by custom order first, then by createdAt
    raw.sort(function(a,b){
      if(a.sortOrder!==undefined&&b.sortOrder!==undefined) return a.sortOrder-b.sortOrder;
      if(a.sortOrder!==undefined) return -1;
      if(b.sortOrder!==undefined) return 1;
      return new Date(b.createdAt)-new Date(a.createdAt);
    });
    allArticles=raw;
    document.getElementById('page-sub').textContent='共 '+allArticles.length+' 則公告';
    applyFilters();
  }).catch(function(){
    document.getElementById('cards-list').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">載入失敗，請重新整理</div></div>';
  });

  function applyFilters(){
    var q=currentQuery.toLowerCase().trim();
    filtered=allArticles.filter(function(a){
      if(currentFilter!=='all'&&a.group!==currentFilter) return false;
      if(q){
        var inT=(a.title||'').toLowerCase().indexOf(q)>=0;
        var inC=(a.content||'').replace(/<[^>]*>/g,'').toLowerCase().indexOf(q)>=0;
        if(!inT&&!inC) return false;
      }
      return true;
    });
    applySort();
  }

  window.applySort=function(){
    var sel=document.getElementById('sort-select');
    currentSort=sel?sel.value:'custom';
    var sorted=filtered.slice();
    if(currentSort==='newest') sorted.sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});
    else if(currentSort==='oldest') sorted.sort(function(a,b){return new Date(a.createdAt)-new Date(b.createdAt);});
    else if(currentSort==='views') sorted.sort(function(a,b){return (b.views||0)-(a.views||0);});
    // custom: already sorted by sortOrder/createdAt from load
    filtered=sorted;
    displayCount=PAGE_SIZE;
    renderList();
  };

  function renderList(){
    var list=document.getElementById('cards-list');
    var countEl=document.getElementById('result-count');
    var lmw=document.getElementById('load-more-wrap');
    if(!list) return;
    if(countEl) countEl.textContent=filtered.length?'找到 '+filtered.length+' 則':'';
    if(!filtered.length){
      list.innerHTML=currentQuery||currentFilter!=='all'
        ?'<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">找不到符合的公告</div></div>'
        :'<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">目前還沒有公告</div></div>';
      if(lmw) lmw.style.display='none';
      return;
    }
    var display=filtered.slice(0,displayCount);
    if(lmw) lmw.style.display=filtered.length>displayCount?'block':'none';
    list.innerHTML=display.map(function(a,i){
      var excerpt=(a.content||'').replace(/<[^>]*>/g,'').slice(0,80);
      var imgHtml=a.image?'<div class="card-img"><img src="'+a.image+'" alt="" loading="lazy"></div>':'';
      var timer=a.postType==='event'?progressHtml(a.eventStart,a.eventTime):(a.eventTime?timerHtml(a.eventTime):'');
      var groupTag=a.group?'<span class="card-group-tag">'+a.group+'</span>':'';
      var views=a.views?'<span class="card-views"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'+a.views+'</span>':'';
      var q=currentQuery;
      return '<a class="card'+(a.pinned?' pinned':'')+' card-animate" href="article.html?id='+encodeURIComponent(a.id)+'" style="animation-delay:'+(i%PAGE_SIZE*0.03)+'s">'
        +'<div class="card-accent"></div>'
        +imgHtml
        +'<div class="card-body">'
        +'<div class="card-meta"><span class="pin-badge">置頂</span>'+groupTag+'<span class="card-date">'+fmtDate(a.createdAt)+'</span>'+views+'</div>'
        +'<div class="card-title">'+hl(a.title||'',q)+'</div>'
        +(excerpt?'<div class="card-excerpt">'+hl(excerpt+(excerpt.length>=80?'⋯':''),q)+'</div>':'')
        +'</div>'
        +'<div class="card-right">'+timer
        +'<div class="card-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>'
        +'</div></a>';
    }).join('');
    startCountdowns();
  }

  window.loadMore=function(){
    displayCount+=PAGE_SIZE;
    renderList();
  };

  window.setFilter=function(group,btn){
    currentFilter=group;
    document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
    if(btn) btn.classList.add('active');
    applyFilters();
  };

  window.handleSearch=function(val){
    currentQuery=val;
    var ni=document.getElementById('nav-search-input');
    if(ni&&ni.value!==val) ni.value=val;
    updateDropdown(val);
    applyFilters();
  };

  function updateDropdown(q){
    var dd=document.getElementById('search-dropdown'); if(!dd) return;
    if(!q||q.trim().length<1){dd.classList.remove('show');return;}
    var results=allArticles.filter(function(a){
      return (a.title||'').toLowerCase().indexOf(q.toLowerCase())>=0
        ||(a.content||'').replace(/<[^>]*>/g,'').toLowerCase().indexOf(q.toLowerCase())>=0;
    }).slice(0,6);
    if(!results.length){dd.innerHTML='<div class="sd-empty">找不到相關公告</div>';}
    else{
      dd.innerHTML=results.map(function(a){
        return '<a class="sd-item" href="article.html?id='+encodeURIComponent(a.id)+'">'
          +'<div class="sd-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>'
          +'<div class="sd-info"><div class="sd-title">'+hl(a.title||'',q)+'</div>'
          +'<div class="sd-meta">'+fmtDate(a.createdAt)+(a.group?' · '+a.group:'')+'</div></div>'
          +'</a>';
      }).join('');
    }
    dd.classList.add('show');
  }
  window.showDropdown=function(){var q=document.getElementById('nav-search-input');if(q&&q.value.trim()) updateDropdown(q.value);};
  window.hideDropdown=function(){setTimeout(function(){var dd=document.getElementById('search-dropdown');if(dd) dd.classList.remove('show');},200);};

  function progressHtml(startTime,endTime){
    if(!endTime) return '';
    var now=Date.now(),end=new Date(endTime).getTime(),diff=end-now;
    var start=startTime?new Date(startTime).getTime():null;
    if(diff<=0) return '<div class="card-progress"><div class="progress-bar-wrap"><div class="progress-bar-fill done" style="width:100%"></div></div><div class="progress-label done">已結束</div></div>';
    if(start&&now<start){var du=Math.ceil((start-now)/86400000);return '<div class="card-progress"><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:0%"></div></div><div class="progress-label">'+du+'天後開始</div></div>';}
    var total=start?(end-start):(end-(now-7*86400000));
    var elapsed=start?(now-start):(7*86400000);
    var pct=Math.min(100,Math.max(0,Math.round(elapsed/total*100)));
    var dl=Math.ceil(diff/86400000),isU=diff<3*86400000;
    var label=dl>1?'還剩 '+dl+' 天':(Math.ceil(diff/3600000)>1?'還剩 '+Math.ceil(diff/3600000)+' 時':'即將結束');
    return '<div class="card-progress" data-start="'+(startTime||'')+'" data-end="'+endTime+'">'
      +'<div class="progress-bar-wrap"><div class="progress-bar-fill'+(isU?' urgent':'')+'" style="width:'+pct+'%"></div></div>'
      +'<div class="progress-label'+(isU?' urgent':'')+' progress-text">'+label+'</div></div>';
  }

  function timerHtml(t){
    var diff=new Date(t)-Date.now();
    if(diff<=0) return '<div class="card-timer done">已結束</div>';
    if(diff>30*86400000) return '<div class="card-timer">'+fmtDate(t)+'</div>';
    return '<div class="card-timer" data-event="'+t+'">計算中</div>';
  }

  function startCountdowns(){
    function pad(n){return(n+'').padStart(2,'0');}
    function tick(){
      document.querySelectorAll('[data-event]').forEach(function(el){
        var diff=new Date(el.dataset.event)-Date.now();
        if(diff<=0){el.textContent='已結束';el.className='card-timer done';return;}
        var d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
        el.textContent=d>0?(d+'天 '+pad(h)+':'+pad(m)+':'+pad(s)):(pad(h)+':'+pad(m)+':'+pad(s));
        el.className=diff<86400000?'card-timer urgent':'card-timer';
      });
    }
    tick(); setInterval(tick,1000);
  }

  function fmtDate(iso){if(!iso) return '';var d=new Date(iso);return d.getFullYear()+'/'+(d.getMonth()+1+'').padStart(2,'0')+'/'+(d.getDate()+'').padStart(2,'0');}
  function hl(text,q){if(!q) return text;var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return text.replace(re,'<mark style="background:#FFF3CD;color:inherit;border-radius:2px;padding:0 2px;">$1</mark>');}
})();
</script>
