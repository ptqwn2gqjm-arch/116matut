<style>
:root{
  --deep:#0D3B5C;--mid:#1A6B9A;--light:#2E9BD4;--pale:#D6EAF8;
  --bg:#F4F8FB;--white:#fff;--text:#0D1F2D;--muted:#7B9BB3;--border:#D0E4F0;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;overflow-x:hidden;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(244,248,251,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);height:60px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;text-decoration:none;color:var(--deep);display:flex;align-items:baseline;gap:5px;}
.nav-logo .num{color:var(--mid);}
.nav-logo .lbl{font-size:12px;font-weight:500;color:var(--muted);}
.nav-back{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:500;color:var(--muted);transition:all .2s;}
.nav-back:hover{background:var(--pale);color:var(--deep);}
.nav-back svg{width:14px;height:14px;}

.main{max-width:980px;margin:0 auto;padding:80px 24px 80px;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:48px;letter-spacing:-.01em;color:var(--deep);margin-bottom:24px;}
.page-title span{color:var(--mid);}

/* CALENDAR */
.cal-wrap{background:white;border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:28px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border);}
.cal-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:var(--deep);}
.cal-nav-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .2s;}
.cal-nav-btn:hover{border-color:var(--mid);color:var(--mid);}
.cal-nav-btn svg{width:16px;height:16px;}
.cal-today-btn{padding:7px 14px;border-radius:6px;border:1.5px solid var(--border);background:white;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:500;color:var(--muted);transition:all .2s;}
.cal-today-btn:hover{border-color:var(--mid);color:var(--mid);}

/* DOW HEADER */
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);border-top:1px solid var(--border);}
.cal-dow{padding:10px 8px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg);}

/* WEEK ROW */
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);position:relative;border-left:1px solid var(--border);}
.cal-cell{
  border-right:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:6px 4px 4px;cursor:pointer;transition:background .15s;
  min-height:80px;
}
.cal-cell:hover{background:rgba(214,234,248,.2);}
.cal-cell.other-month{background:#fafbfc;}
.cal-cell.today{background:rgba(26,107,154,.04);}
.cal-cell.selected{background:rgba(214,234,248,.4);}
.cal-num{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;
  color:var(--text);display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:50%;margin-bottom:3px;
}
.cal-cell.today .cal-num{background:var(--deep);color:white;}
.cal-cell.other-month .cal-num{color:var(--border);}
.cal-cell.selected .cal-num{background:var(--mid);color:white;}

/* EVENT BLOCKS - absolute positioned in week */
.cal-event{
  position:absolute;height:20px;
  display:flex;align-items:center;
  padding:0 6px;overflow:hidden;
  font-size:11px;font-weight:600;color:white;
  text-decoration:none;white-space:nowrap;
  cursor:pointer;z-index:2;
  transition:opacity .15s;
  border-radius:0;
}
.cal-event:hover{opacity:.82;}
.cal-event.ev-start{border-radius:4px 0 0 4px;}
.cal-event.ev-end{border-radius:0 4px 4px 0;}
.cal-event.ev-both{border-radius:4px;}

/* DOTS (mobile) */
.cal-dots{display:none;gap:3px;flex-wrap:wrap;margin-top:3px;}
.cal-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* LEGEND */
.cal-legend{display:flex;gap:14px;flex-wrap:wrap;padding:14px 24px;border-top:1px solid var(--border);}
.cal-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;}
.cal-legend-dot{width:12px;height:12px;border-radius:3px;}

/* DAY EVENTS PANEL */
.day-panel{
  background:white;border:1.5px solid var(--border);border-radius:14px;
  margin-bottom:28px;overflow:hidden;
}
.day-panel-header{
  padding:16px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.day-panel-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--deep);}
.day-panel-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.day-panel-body{padding:0;}
.day-event-item{
  display:flex;align-items:center;gap:14px;
  padding:14px 24px;border-bottom:1px solid var(--border);
  text-decoration:none;color:var(--text);transition:background .15s;
}
.day-event-item:last-child{border-bottom:none;}
.day-event-item:hover{background:var(--bg);}
.day-event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.day-event-info{flex:1;min-width:0;}
.day-event-title{font-size:15px;font-weight:600;margin-bottom:3px;}
.day-event-meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.day-event-group{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;background:rgba(46,155,212,.1);color:var(--light);}
.day-event-status{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;}
.day-event-arrow{color:var(--muted);}
.day-event-arrow svg{width:16px;height:16px;}
.day-empty{text-align:center;padding:28px;font-size:14px;color:var(--muted);}

/* BOTTOM SHEET (mobile) */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;opacity:0;transition:opacity .3s;}
.sheet-overlay.show{display:block;}
.sheet-overlay.visible{opacity:1;}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:401;background:white;border-radius:20px 20px 0 0;max-height:75vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);box-shadow:0 -8px 40px rgba(0,0,0,.15);}
.bottom-sheet.show{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.sheet-header{padding:14px 20px 12px;border-bottom:1px solid var(--border);position:relative;}
.sheet-date{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--deep);}
.sheet-subtitle{font-size:12px;color:var(--muted);margin-top:2px;}
.sheet-close{position:absolute;top:12px;right:16px;width:28px;height:28px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.sheet-close svg{width:14px;height:14px;}
.sheet-body{overflow-y:auto;flex:1;padding-bottom:16px;}
.sheet-event{display:flex;align-items:center;gap:12px;padding:14px 20px;text-decoration:none;color:var(--text);transition:background .15s;border-bottom:1px solid var(--border);}
.sheet-event:last-child{border-bottom:none;}
.sheet-event:hover{background:var(--bg);}
.sheet-event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.sheet-event-info{flex:1;min-width:0;}
.sheet-event-title{font-size:15px;font-weight:600;margin-bottom:3px;}
.sheet-event-meta{font-size:12px;color:var(--muted);}
.sheet-event-group{font-size:11px;font-weight:600;color:var(--light);background:rgba(46,155,212,.1);padding:1px 7px;border-radius:10px;display:inline-block;margin-right:4px;}
.sheet-arrow svg{width:16px;height:16px;color:var(--muted);}
.sheet-empty{text-align:center;padding:32px;color:var(--muted);font-size:14px;}

.line-float{position:fixed;bottom:32px;right:20px;z-index:200;}
.line-btn{width:48px;height:48px;border-radius:50%;background:#06C755;display:flex;align-items:center;justify-content:center;text-decoration:none;box-shadow:0 4px 16px rgba(6,199,85,.4);transition:transform .2s;}
.line-btn:hover{transform:scale(1.08);}
.line-btn svg{width:26px;height:26px;fill:white;}

footer{padding:28px 32px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.footer-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--deep);}
.footer-logo span{color:var(--mid);}
.footer-copy{font-size:12px;color:var(--muted);}

@media(max-width:768px){
  nav{padding:0 16px;height:54px;}
  .nav-logo{font-size:22px;}
  .nav-logo .lbl{display:none;}
  .nav-back span{display:none;}
  .main{padding:70px 14px 80px;}
  .page-title{font-size:36px;}
  .cal-header{padding:14px 16px;}
  .cal-cell{min-height:48px;padding:4px 2px 2px;}
  .cal-num{font-size:12px;width:20px;height:20px;}
  .cal-event{display:none!important;}
  .cal-dots{display:flex;}
  .cal-legend{padding:10px 16px;gap:10px;}
  .day-panel-header{padding:14px 16px;}
  .day-event-item{padding:12px 16px;}
  footer{padding:20px 16px;flex-direction:column;gap:8px;text-align:center;}
  .line-float{bottom:24px;right:14px;}
}
@media(min-width:769px){
  .sheet-overlay,.bottom-sheet{display:none!important;}
}
</style>
</head>

<script>
(function(){
  var MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  var DOWS=['日','一','二','三','四','五','六'];
  var COLORS=['#1A6B9A','#27ae60','#e67e22','#8e44ad','#e74c3c','#2980b9','#16a085'];
  var TRACK_H=22;
  var CELL_TOP=30;
  var calYear=new Date().getFullYear();
  var calMonth=new Date().getMonth();
  var articles=[];
  var groups=[];
  var groupColors={};
  var selectedDate=null; // currently selected date
  var isMobile=function(){return window.innerWidth<=768;};

  // Load data
  window.db.ref('settings/groups').once('value').then(function(s){
    var g=s.val(); if(g&&Array.isArray(g)) groups=g;
  });
  window.db.ref('settings/groupColors').once('value').then(function(s){
    var c=s.val(); if(c&&typeof c==='object') groupColors=c;
  });
  window.db.ref('articles').once('value').then(function(s){
    var val=s.val();
    articles=val?Object.values(val).filter(function(a){
      return !a.draft&&a.eventTime&&a.showInCalendar!==false;
    }):[];
    renderCalendar();
    // Show today's events by default
    var today=new Date(); today.setHours(0,0,0,0);
    selectedDate=today;
    renderDayPanel(today);
  });

  function getColor(group,articleColor){
    if(articleColor) return articleColor;
    if(groupColors[group]) return groupColors[group];
    var idx=groups.indexOf(group);
    return idx>=0?COLORS[idx%COLORS.length]:COLORS[COLORS.length-1];
  }

  function dk(d){
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  }
  function pad(n){return(n+'').padStart(2,'0');}

  function sameDay(a,b){
    return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
  }

  /* ── CALENDAR ── */
  function renderCalendar(){
    document.getElementById('cal-title').textContent=calYear+' · '+MONTHS[calMonth];
    var dowRow=document.getElementById('cal-dow-row');
    dowRow.innerHTML=DOWS.map(function(d){return '<div class="cal-dow">'+d+'</div>';}).join('');

    var first=new Date(calYear,calMonth,1);
    var startDow=first.getDay();
    var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
    var today=new Date(); today.setHours(0,0,0,0);

    var cells=[];
    for(var i=startDow-1;i>=0;i--){
      var prev=new Date(calYear,calMonth,0);
      cells.push(new Date(calYear,calMonth-1,prev.getDate()-i));
    }
    for(var d=1;d<=daysInMonth;d++) cells.push(new Date(calYear,calMonth,d));
    while(cells.length<42) cells.push(new Date(calYear,calMonth+1,cells.length-startDow-daysInMonth+1));

    // Assign fixed tracks
    var trackSlots=[];
    var articleMeta=[];
    articles.forEach(function(a){
      var startD=a.eventStart?new Date(a.eventStart):new Date(a.eventTime);
      var endD=new Date(a.eventTime);
      startD.setHours(0,0,0,0); endD.setHours(0,0,0,0);
      var color=getColor(a.group,a.color);
      var t=0;
      while(t<trackSlots.length&&trackSlots[t]>=startD.getTime()) t++;
      trackSlots[t]=endD.getTime();
      articleMeta.push({article:a,startD:startD,endD:endD,color:color,track:t});
    });

    var totalTracks=trackSlots.length;
    var cellH=CELL_TOP+(totalTracks*(TRACK_H+3))+8;

    var body=document.getElementById('cal-body');
    body.innerHTML='';

    for(var row=0;row<6;row++){
      var weekDiv=document.createElement('div');
      weekDiv.className='cal-week';
      weekDiv.style.minHeight=cellH+'px';

      var weekCells=cells.slice(row*7,(row+1)*7);
      var weekStart=new Date(weekCells[0]); weekStart.setHours(0,0,0,0);
      var weekEnd=new Date(weekCells[6]); weekEnd.setHours(0,0,0,0);

      // Cells
      weekCells.forEach(function(cellDate){
        var cellDiv=document.createElement('div');
        var isOther=cellDate.getMonth()!==calMonth;
        var isToday=sameDay(cellDate,today);
        var isSelected=selectedDate&&sameDay(cellDate,selectedDate);
        cellDiv.className='cal-cell'+(isOther?' other-month':'')+(isToday?' today':'')+(isSelected?' selected':'');
        cellDiv.style.minHeight=cellH+'px';

        var numSpan=document.createElement('span');
        numSpan.className='cal-num';
        numSpan.textContent=cellDate.getDate();
        cellDiv.appendChild(numSpan);

        // Mobile dots
        var dotsDiv=document.createElement('div');
        dotsDiv.className='cal-dots';
        var seen={};
        articleMeta.forEach(function(m){
          var cd=new Date(cellDate); cd.setHours(0,0,0,0);
          if(cd.getTime()>=m.startD.getTime()&&cd.getTime()<=m.endD.getTime()&&!seen[m.color]){
            seen[m.color]=true;
            var dot=document.createElement('div');
            dot.className='cal-dot'; dot.style.background=m.color;
            dotsDiv.appendChild(dot);
          }
        });
        cellDiv.appendChild(dotsDiv);

        (function(cd){
          cellDiv.addEventListener('click',function(){
            onCellClick(cd);
          });
        })(new Date(cellDate));

        weekDiv.appendChild(cellDiv);
      });

      // Event blocks
      articleMeta.forEach(function(m){
        if(m.endD.getTime()<weekStart.getTime()||m.startD.getTime()>weekEnd.getTime()) return;
        var visStart=m.startD.getTime()<weekStart.getTime()?weekStart:m.startD;
        var visEnd=m.endD.getTime()>weekEnd.getTime()?weekEnd:m.endD;
        var startCol=-1,endCol=-1;
        weekCells.forEach(function(wc,ci){
          var wt=new Date(wc); wt.setHours(0,0,0,0);
          if(wt.getTime()===visStart.getTime()) startCol=ci;
          if(wt.getTime()===visEnd.getTime()) endCol=ci;
        });
        if(startCol<0||endCol<0) return;
        var colSpan=endCol-startCol+1;
        var isRealStart=m.startD.getTime()>=weekStart.getTime();
        var isRealEnd=m.endD.getTime()<=weekEnd.getTime();
        var top=CELL_TOP+(m.track*(TRACK_H+3));
        var PAD=2;
        var ev=document.createElement('a');
        ev.href='article.html?id='+encodeURIComponent(m.article.id);
        ev.className='cal-event'+(isRealStart&&isRealEnd?' ev-both':isRealStart?' ev-start':isRealEnd?' ev-end':'');
        ev.title=m.article.title;
        ev.style.top=top+'px';
        ev.style.left='calc('+(startCol/7*100)+'% + '+(isRealStart?PAD:0)+'px)';
        ev.style.width='calc('+(colSpan/7*100)+'% - '+(isRealStart?PAD:0)+'px - '+(isRealEnd?PAD:0)+'px)';
        ev.style.height=TRACK_H+'px';
        ev.style.background=m.color;
        ev.textContent=isRealStart?m.article.title:'';
        ev.addEventListener('click',function(e){e.stopPropagation();});
        weekDiv.appendChild(ev);
      });

      body.appendChild(weekDiv);
    }

    // Legend
    var usedGroups=[];
    articleMeta.forEach(function(m){if(m.article.group&&usedGroups.indexOf(m.article.group)<0) usedGroups.push(m.article.group);});
    var legendEl=document.getElementById('cal-legend');
    legendEl.innerHTML=usedGroups.map(function(g){
      var c=getColor(g,null);
      return '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:'+c+'"></div><span>'+g+'</span></div>';
    }).join('');
    legendEl.style.display=usedGroups.length?'':'none';
  }

  /* ── CELL CLICK ── */
  function onCellClick(date){
    selectedDate=date;
    // Update selected state on cells
    document.querySelectorAll('.cal-cell').forEach(function(c){c.classList.remove('selected');});
    document.querySelectorAll('.cal-cell').forEach(function(c){
      var num=c.querySelector('.cal-num');
      if(!num) return;
      // Match by checking if this cell corresponds to selected date
      var cellDate=new Date(calYear,calMonth,parseInt(num.textContent));
      if(sameDay(cellDate,date)) c.classList.add('selected');
    });

    if(isMobile()){
      openSheet(date);
    } else {
      renderDayPanel(date);
    }
  }

  /* ── DAY PANEL (desktop) ── */
  function renderDayPanel(date){
    var titleEl=document.getElementById('day-panel-title');
    var subEl=document.getElementById('day-panel-sub');
    var bodyEl=document.getElementById('day-panel-body');
    if(!titleEl||!bodyEl) return;

    var today=new Date(); today.setHours(0,0,0,0);
    var isToday=sameDay(date,today);
    var dows=['日','一','二','三','四','五','六'];
    var label=isToday?'今天':(date.getMonth()+1)+'月'+date.getDate()+'日（'+dows[date.getDay()]+'）';
    titleEl.textContent=label+'的活動';

    var dateTime=new Date(date); dateTime.setHours(0,0,0,0);
    var evs=articles.filter(function(a){
      var startD=a.eventStart?new Date(a.eventStart):new Date(a.eventTime);
      var endD=new Date(a.eventTime);
      startD.setHours(0,0,0,0); endD.setHours(0,0,0,0);
      return dateTime.getTime()>=startD.getTime()&&dateTime.getTime()<=endD.getTime();
    });

    subEl.textContent=evs.length?evs.length+' 個活動':'';

    if(!evs.length){
      bodyEl.innerHTML='<div class="day-empty">這天沒有安排活動</div>';
      return;
    }

    var now=Date.now();
    bodyEl.innerHTML=evs.map(function(a){
      var color=getColor(a.group,a.color);
      var end=new Date(a.eventTime).getTime();
      var diff=end-now;
      var isDone=diff<=0;
      var statusText=isDone?'已結束':(diff<86400000?'即將截止':'進行中');
      var statusColor=isDone?'#999':(diff<86400000?'#e74c3c':'#27ae60');
      return '<a class="day-event-item" href="article.html?id='+encodeURIComponent(a.id)+'">'
        +'<div class="day-event-dot" style="background:'+color+'"></div>'
        +'<div class="day-event-info">'
        +'<div class="day-event-title">'+a.title+'</div>'
        +'<div class="day-event-meta">'
        +(a.group?'<span class="day-event-group">'+a.group+'</span>':'')
        +'<span class="day-event-status" style="background:'+statusColor+'18;color:'+statusColor+'">'+statusText+'</span>'
        +(a.eventStart?'<span>'+fmtD(a.eventStart)+' → '+fmtD(a.eventTime)+'</span>':'<span>截止 '+fmtD(a.eventTime)+'</span>')
        +'</div>'
        +'</div>'
        +'<div class="day-event-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>'
        +'</a>';
    }).join('');
  }

  /* ── MOBILE SHEET ── */
  function openSheet(date){
    var dows=['日','一','二','三','四','五','六'];
    document.getElementById('sheet-date').textContent=(date.getMonth()+1)+'月'+date.getDate()+'日（'+dows[date.getDay()]+'）';
    var dateTime=new Date(date); dateTime.setHours(0,0,0,0);
    var evs=articles.filter(function(a){
      var startD=a.eventStart?new Date(a.eventStart):new Date(a.eventTime);
      var endD=new Date(a.eventTime);
      startD.setHours(0,0,0,0); endD.setHours(0,0,0,0);
      return dateTime.getTime()>=startD.getTime()&&dateTime.getTime()<=endD.getTime();
    });
    document.getElementById('sheet-subtitle').textContent=evs.length?evs.length+' 個活動':'沒有活動';
    var body=document.getElementById('sheet-body');
    if(!evs.length){
      body.innerHTML='<div class="sheet-empty">這天沒有安排活動</div>';
    } else {
      var now=Date.now();
      body.innerHTML=evs.map(function(a){
        var color=getColor(a.group,a.color);
        var diff=new Date(a.eventTime).getTime()-now;
        var isDone=diff<=0;
        var status=isDone?'已結束':(diff<86400000?'即將截止':'進行中');
        return '<a class="sheet-event" href="article.html?id='+encodeURIComponent(a.id)+'">'
          +'<div class="sheet-event-dot" style="background:'+color+'"></div>'
          +'<div class="sheet-event-info">'
          +'<div class="sheet-event-title">'+a.title+'</div>'
          +'<div class="sheet-event-meta">'
          +(a.group?'<span class="sheet-event-group">'+a.group+'</span>':'')
          +'<span>'+status+'</span>'
          +'</div></div>'
          +'<div class="sheet-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>'
          +'</a>';
      }).join('');
    }
    var overlay=document.getElementById('sheet-overlay');
    var sheet=document.getElementById('bottom-sheet');
    overlay.style.display='block'; sheet.style.display='flex'; sheet.style.flexDirection='column';
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      overlay.classList.add('show'); requestAnimationFrame(function(){overlay.classList.add('visible');});
      sheet.classList.add('show');
    });});
    document.body.style.overflow='hidden';
  }

  window.closeSheet=function(){
    var overlay=document.getElementById('sheet-overlay');
    var sheet=document.getElementById('bottom-sheet');
    overlay.classList.remove('visible');
    sheet.classList.remove('show');
    setTimeout(function(){overlay.classList.remove('show');overlay.style.display='none';sheet.style.display='none';document.body.style.overflow='';},350);
  };

  // Swipe to close
  var swipeY=0,swiping=false;
  document.addEventListener('touchstart',function(e){var s=document.getElementById('bottom-sheet');if(s&&s.classList.contains('show')&&s.contains(e.target)){swipeY=e.touches[0].clientY;swiping=true;}},{passive:true});
  document.addEventListener('touchmove',function(e){if(!swiping) return;if(e.touches[0].clientY-swipeY>80){swiping=false;window.closeSheet();}},{passive:true});
  document.addEventListener('touchend',function(){swiping=false;},{passive:true});

  window.calMove=function(dir){
    calMonth+=dir;
    if(calMonth>11){calMonth=0;calYear++;}
    if(calMonth<0){calMonth=11;calYear--;}
    selectedDate=null;
    renderCalendar();
    // Show today if in current month, else clear panel
    var today=new Date(); today.setHours(0,0,0,0);
    if(today.getFullYear()===calYear&&today.getMonth()===calMonth){
      selectedDate=today; renderDayPanel(today);
    } else {
      document.getElementById('day-panel-title').textContent=MONTHS[calMonth]+'的活動';
      document.getElementById('day-panel-sub').textContent='點擊日期查看當天活動';
      document.getElementById('day-panel-body').innerHTML='<div class="day-empty">點擊日曆上的日期查看活動</div>';
    }
  };

  window.goToday=function(){
    calYear=new Date().getFullYear();
    calMonth=new Date().getMonth();
    selectedDate=new Date(); selectedDate.setHours(0,0,0,0);
    renderCalendar();
    renderDayPanel(selectedDate);
  };

  function fmtD(iso){if(!iso) return '';var d=new Date(iso);return(d.getMonth()+1)+'/'+d.getDate();}
})();
</script>
</body>
</html>
